<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Gens Launcher</title>
    <style>
        :root {
            --bg-main: #1e1e1e;
            --bg-panel: #252526;
            --bg-header: #333333;
            --border: #444444;
            --accent: #007acc;
            --accent-hover: #0098ff;
            --text-main: #cccccc;
            --text-light: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* HEADER */
        .header {
            background: var(--bg-header);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-light);
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        select.account-dropdown {
            background: var(--bg-main);
            color: var(--text-light);
            border: 1px solid var(--border);
            padding: 6px 10px;
            border-radius: 3px;
            cursor: pointer;
        }

        button {
            background: #3a3a3a;
            color: var(--text-light);
            border: 1px solid var(--border);
            padding: 6px 15px;
            border-radius: 3px;
            cursor: pointer;
            transition: 0.1s;
        }

        button:hover {
            background: #505050;
        }

        button.primary {
            background: var(--accent);
            border-color: var(--accent);
            font-weight: bold;
        }

        button.primary:hover {
            background: var(--accent-hover);
        }

        /* WORKSPACE */
        .workspace {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }

        /* GRID */
        .instances-grid {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            align-content: start;
            gap: 15px;
        }

        .instance-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            border: 1px solid transparent;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            transition: 0.1s;
        }

        .instance-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #555;
        }

        .instance-card.active {
            background: rgba(0, 122, 204, 0.2);
            border-color: var(--accent);
        }

        .instance-icon {
            width: 64px;
            height: 64px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 8px;
            image-rendering: pixelated;
            background: #111;
        }

        .instance-name {
            font-size: 0.85rem;
            color: var(--text-light);
            word-wrap: break-word;
            width: 100%;
            font-weight: bold;
        }

        .instance-version {
            font-size: 0.7rem;
            color: #888;
            margin-top: 3px;
        }

        /* PANEL */
        .action-panel {
            width: 250px;
            background: var(--bg-panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .action-panel h3 {
            margin: 0 0 15px 0;
            color: var(--text-light);
            font-size: 1.1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .action-btn {
            width: 100%;
            margin-bottom: 8px;
            padding: 10px;
            text-align: left;
        }

        .action-btn.play {
            background: #3c8527;
            border-color: #47a031;
            text-align: center;
            font-size: 1.1rem;
            padding: 15px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .action-btn.play:hover {
            background: #47a031;
        }

        .action-btn.play:disabled {
            background: #444;
            border-color: #333;
            color: #888;
            cursor: not-allowed;
        }

        .status-box {
            margin-top: auto;
            padding: 10px;
            background: #111;
            border: 1px solid var(--border);
            border-radius: 3px;
            font-size: 0.8rem;
        }

        .progress-bar-bg {
            width: 100%;
            height: 4px;
            background: #333;
            margin-top: 5px;
        }

        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: var(--accent);
            transition: 0.2s;
        }

        /* MODALS */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-card {
            background: var(--bg-panel);
            padding: 25px;
            border: 1px solid var(--border);
            width: 400px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .modal-card h2 {
            margin-top: 0;
            color: var(--text-light);
        }

        input,
        select {
            width: 100%;
            padding: 8px;
            margin: 8px 0 15px 0;
            background: var(--bg-main);
            color: var(--text-light);
            border: 1px solid var(--border);
            box-sizing: border-box;
            border-radius: 2px;
        }

        .form-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-group input {
            width: 80px;
            margin: 0;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="header-title">Gens Launcher</div>
        <div class="header-controls">
            <select id="account-dropdown" class="account-dropdown" onchange="changeAccount()">
                <option value="">-- Choisir un compte --</option>
            </select>
            <button onclick="openAccountModal()">Nouveau compte</button>
            <button class="primary" onclick="openInstanceModal()">+ Créer une instance</button>
        </div>
    </div>

    <div class="workspace">
        <div class="instances-grid" id="instance-grid"></div>

        <div class="action-panel" id="action-panel" style="opacity: 0.3; pointer-events: none;">
            <h3 id="panel-title">Aucune instance</h3>
            <button id="launch-btn" class="action-btn play" disabled>JOUER</button>
            <button class="action-btn" onclick="openDir('')">📂 Dossier instance</button>
            <button class="action-btn" id="btn-mods" onclick="openDir('mods')">🧩 Dossier Mods</button>
            <button class="action-btn" onclick="openDir('resourcepacks')">🎨 Resource Packs</button>

            <div style="margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px;">
                <button class="action-btn" onclick="openEditModal()">⚙️ Paramètres</button>
                <button class="action-btn" style="color: #ff5555;" onclick="deleteInstance()">❌ Supprimer</button>
            </div>

            <div class="status-box">
                <div id="status-text">Prêt.</div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-instance" class="modal">
        <div class="modal-card">
            <h2>Nouvelle Instance</h2>
            <label>Nom :</label> <input type="text" id="new-name" placeholder="Ex: Survie Moddée">
            <label>Version Minecraft :</label> <select id="new-version"></select>
            <label>Moteur de jeu :</label>
            <select id="new-loader">
                <option value="vanilla">Vanilla</option>
                <option value="fabric">Fabric</option>
                <option value="forge">Forge</option>
            </select>
            <div class="form-group">
                <label>RAM Allouée (Go) :</label>
                <input type="number" id="new-ram" value="4">
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="primary" style="flex-grow: 1;" onclick="saveInstance()">Créer</button>
                <button style="flex-grow: 1;" onclick="closeInstanceModal()">Annuler</button>
            </div>
        </div>
    </div>

    <div id="modal-edit" class="modal">
        <div class="modal-card">
            <h2>Paramètres</h2>
            <label>Renommer :</label> <input type="text" id="edit-name">
            <label>RAM (Go) :</label> <input type="number" id="edit-ram">
            <label>Changer le Logo (.png/.jpg) :</label> <input type="file" id="edit-icon"
                accept="image/png, image/jpeg">
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="primary" style="flex-grow: 1;" onclick="saveEdit()">Appliquer</button>
                <button style="flex-grow: 1;" onclick="closeEditModal()">Fermer</button>
            </div>
        </div>
    </div>

    <div id="modal-account" class="modal">
        <div class="modal-card">
            <h2>Ajouter un joueur</h2>
            <label>Pseudo :</label> <input type="text" id="acc-name" placeholder="Ton pseudo">
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="primary" style="flex-grow: 1;" onclick="saveAccount()">Ajouter</button>
                <button style="flex-grow: 1;" onclick="closeAccountModal()">Annuler</button>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>

</html>
